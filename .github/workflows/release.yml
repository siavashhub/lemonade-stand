# Release pipeline.
#
# Triggered when a semantic-version tag (e.g. v0.0.1) is pushed. The flow is:
#
#   gate    → validates the release notes file exists and the tag matches
#             package.json (scripts/check-release.mjs), plus a type-check.
#   build   → builds and packages installers on Windows, macOS and Linux.
#   release → creates the GitHub Release using releases/<tag>.md as the body
#             and attaches every installer artifact.
#
# The `gate` job is a hard prerequisite for `build`, so no installer is ever
# produced for a tag that lacks its releases/v<version>.md notes file.

name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual fallback: run the pipeline for an existing tag from the Actions tab
  # (useful if a tag push didn't trigger a run, e.g. branch + tag pushed together).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.0.1). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

env:
  # The tag being released: the pushed tag on a tag event, else the manual input.
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Enforce release notes + version/tag match
        run: node scripts/check-release.mjs "${{ env.RELEASE_TAG }}"
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck

  build:
    name: Build ${{ matrix.os }}
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Package installer
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.blockmap
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [gate, build]
    runs-on: ubuntu-latest
    # Publish as long as the gate passed and the run wasn't cancelled, even if
    # one platform's build failed — so a single flaky/broken OS leg can't block
    # shipping the installers that did build successfully.
    if: ${{ !cancelled() && needs.gate.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: releases/${{ env.RELEASE_TAG }}.md
          files: artifacts/**/*
          fail_on_unmatched_files: true
